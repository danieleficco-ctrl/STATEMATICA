<!-- Sidebar -->
    <div class="sidebar">
    <div class="logo-area">MCU</div>
    <ul class="menu">
        {% for corso in corsi %}
        <li class="course-item" data-corso-id="{{ corso.id }}">
            <div class="course-title" onclick="toggleCourse(this)">
                {{ corso.nome }} <span class="chevron">▶</span>
            </div>
            <ul class="modules-list">
                {% for modulo in corso.moduli %}
                <li class="module-item" data-modulo-id="{{ modulo.id }}">
                    <div class="module-title" onclick="toggleModule(this)">
                        {{ modulo.nome }} <span class="chevron">▼</span>
                    </div>
                    <ul class="lessons-list">
                        {% for lezione in modulo.lezioni %}
                        <li class="lesson-item" data-lezione-id="{{ lezione.id }}" onclick="selectLesson({{ lezione.id }})">
                            <span class="lesson-icon">▶</span>
                            <span class="lesson-title">{{ lezione.titolo }}</span>
                        </li>
                        {% endfor %}
                    </ul>
                </li>
                {% endfor %}
            </ul>
        </li>
        {% endfor %}
    </ul>
    <div class="admin-link"><a href="{{ url_for('admin') }}">⚙️ Admin Panel</a></div>
</div>
