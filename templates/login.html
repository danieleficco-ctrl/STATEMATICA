{% extends "base.html" %}

{% block title %}Accedi - MCU{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h1>Accedi a MCU</h1>
        <form method="POST" action="{{ url_for('login') }}">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required placeholder="La tua email">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required placeholder="La tua password">
            </div>
            <div class="form-group">
                <label>
                    <input type="checkbox" name="remember"> Ricordami
                </label>
            </div>
            <button type="submit" class="btn btn-primary btn-block">Accedi</button>
        </form>
        <p class="auth-link">
            Non hai un account? <a href="{{ url_for('register') }}">Registrati</a>
        </p>
    </div>
</div>
{% endblock %}
